name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Publish dry run
        run: npm publish --dry-run
